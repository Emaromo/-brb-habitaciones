version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: brb_postgres
    environment:
      POSTGRES_DB: brb_habitaciones
      POSTGRES_USER: brb
      POSTGRES_PASSWORD: brb_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brb -d brb_habitaciones"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brb_api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=brb_habitaciones;Username=brb;Password=brb_password
      - Jwt__Secret=DEVELOPMENT_SECRET_CHANGE_IN_PRODUCTION_MIN_32_CHARS_LONG
      - Jwt__Issuer=http://localhost:8080
      - Jwt__Audience=http://localhost:3000
      - Cors__AllowedOrigins=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
